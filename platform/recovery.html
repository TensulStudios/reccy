<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Temporary Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #111111;
            border-bottom: 1px solid #222222;
            padding: 20px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 18px;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888888;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 14px;
            color: #888888;
            user-select: none;
        }

        input {
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            outline: none;
            user-select: text;
        }

        input:focus {
            border-color: #444444;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #ffffff;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #e0e0e0;
        }

        button:disabled {
            background: #333333;
            color: #666666;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            color: #6fcf6f;
        }

        .message.error {
            color: #cf6f6f;
        }

        footer {
            border-top: 1px solid #222222;
            padding: 40px;
            color: #555555;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="https://tempstudios.xyz">Home</a>
        </div>
    </nav>

    <main>
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below.</p>

        <div class="card">
            <div class="field">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password">
            </div>
            <div class="field">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" placeholder="Confirm new password">
            </div>
            <button id="btn" onclick="resetPassword()">Reset Password</button>
            <div class="message" id="msg"></div>
        </div>
    </main>

    <footer>
        &copy; 2025 Temporary Studios
    </footer>

    <script>
        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');

            msg.style.display = 'none';
            msg.className = 'message';

            if (!password || password.length < 6) {
                msg.textContent = 'Password must be at least 6 characters.';
                msg.classList.add('error');
                msg.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                msg.textContent = 'Passwords do not match.';
                msg.classList.add('error');
                msg.style.display = 'block';
                return;
            }

            const token = new URLSearchParams(window.location.search).get('token');

            if (!token) {
                msg.textContent = 'Invalid or missing reset link. Request a new one.';
                msg.classList.add('error');
                msg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch('https://13BB3B.playfabapi.com/Client/ResetPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Token: token, Password: password, TitleId: '13BB3B' })
                });

                const data = await response.json();

                if (data.status === 'OK') {
                    msg.textContent = 'Password reset. You can now log in.';
                    msg.classList.add('success');
                    btn.textContent = 'Done';
                } else {
                    msg.textContent = data.errorMessage || 'Something went wrong. Try again.';
                    msg.classList.add('error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch {
                msg.textContent = 'Network error. Check your connection and try again.';
                msg.classList.add('error');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }

            msg.style.display = 'block';
        }
    </script>
</body>
</html>
